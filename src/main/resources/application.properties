spring.application.name=comment_publisher

# Server
server.port=4000

# Cassandra
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter_live_comments
spring.cassandra.keyspace-name=live_comments
spring.cassandra.schema-action=create_if_not_exists

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
